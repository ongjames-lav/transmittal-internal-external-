{% extends 'accounts/gmail_base.html' %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<style>
    :root {
        --gmail-blue: #1a73e8;
        --gmail-green: #1e8e3e;
        --gmail-gray: #5f6368;
        --gmail-light-gray: #f1f3f4;
        --gmail-text: #202124;
    }

    body {
        font-family: 'Google Sans', 'Segoe UI', Arial, sans-serif;
        background: #f8f9fa;
    }

    .success-container {
        max-width: 500px;
        margin: 80px auto;
        padding: 0 20px;
    }

    .success-card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
        padding: 48px 40px;
        text-align: center;
    }

    .success-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, var(--gmail-green) 0%, #15a143 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 48px;
    }

    .success-title {
        font-size: 24px;
        font-weight: 400;
        color: var(--gmail-text);
        margin: 0 0 12px 0;
    }

    .success-message {
        color: var(--gmail-gray);
        font-size: 14px;
        line-height: 1.6;
        margin: 0 0 32px 0;
    }

    .gmail-btn {
        padding: 10px 24px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-block;
    }

    .gmail-btn-primary {
        background: var(--gmail-blue);
        color: white;
    }

    .gmail-btn-primary:hover {
        background: #1765cc;
        box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
    }

    .gmail-btn-secondary {
        background: var(--gmail-light-gray);
        color: var(--gmail-text);
        margin-left: 12px;
    }

    .gmail-btn-secondary:hover {
        background: #e8eaed;
        box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
    }

    .button-group {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 20px;
    }

</style>

<div class="success-container">
    <div class="success-card">
        <div class="success-icon">
            ✓
        </div>
        <h1 class="success-title">Transmittal sent successfully!</h1>
        <p class="success-message">
            Your transmittal report has been delivered to the recipient's inbox.
        </p>
        <div class="button-group">
            <a href="{% url 'accounts:dashboard' %}" class="gmail-btn gmail-btn-primary">
                Return to Dashboard
            </a>
            {% if transmittal %}
            <a href="{% url 'transmittals:detail' transmittal.id %}?autoprint=true" class="gmail-btn gmail-btn-secondary">
                🖨️ Print Report
            </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
