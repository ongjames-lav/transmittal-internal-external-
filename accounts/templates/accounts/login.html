{% extends 'accounts/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<h1>Login</h1>

<form method="post">
    {% csrf_token %}

    {% if form.errors %}
    <div class="message error"
        style="background: #f8d7da; border-left: 4px solid #dc3545; color: #721c24; padding: 15px; margin-bottom: 20px; border-radius: 4px;">
        <p><strong>Login Failed</strong></p>
        <p>Invalid username or password. Please try again.</p>
    </div>
    {% endif %}

    <div class="form-group">
        <label for="id_username">Username:</label>
        <input type="text" name="username" id="id_username" required>
    </div>

    <div class="form-group">
        <label for="id_password">Password:</label>
        <input type="password" name="password" id="id_password" required>
    </div>

    <button type="submit">Login</button>
</form>

<div class="link-group">
    <p>Don't have an account? <a href="{% url 'accounts:register' %}">Register here</a></p>
    <!-- <p><a href="{% url 'accounts:password_reset' %}">Forgot your password?</a></p> -->
</div>
{% endblock %}
